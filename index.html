<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATTE OS — Max's Dashboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F4;--surface:#FFFFFF;--border:#E8E5E0;--border-light:#F0EDE8;
  --text:#1A1814;--text-secondary:#6B6560;--text-tertiary:#A8A29C;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
input,select,button{font-family:'DM Sans',sans-serif;font-size:14px}
input,select{outline:none}
button{cursor:pointer;border:none;background:none}
a{text-decoration:none}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 0.8s linear infinite}
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;min-width:0;padding:28px 32px;max-width:900px}
.logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.logo-text{font-size:15px;font-weight:600;letter-spacing:0.02em}
.logo-sub{font-size:11px;color:var(--text-tertiary);font-family:'DM Mono',monospace}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 20px;font-size:13px;color:var(--text-secondary);cursor:pointer;transition:all 0.15s;border-right:2px solid transparent}
.nav-item:hover{color:var(--text);background:#FAF9F7}
.nav-item.active{color:var(--text);background:#FAF9F7;border-right-color:var(--text)}
.nav-item i{font-size:15px;width:16px;flex-shrink:0}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto}
.nav-badge{font-size:10px;padding:1px 6px;border-radius:10px;margin-left:auto}
.nav-badge-gray{background:#E8E5E0;color:var(--text-secondary)}
.nav-badge-red{background:#FCEBEB;color:#A32D2D;font-weight:500}
.nav-section{padding:16px 20px 6px;font-size:10px;font-weight:500;color:var(--text-tertiary);letter-spacing:0.08em;text-transform:uppercase}
.page-header{margin-bottom:24px}
.page-date{font-size:12px;color:var(--text-tertiary);margin-bottom:4px;font-family:'DM Mono',monospace}
.page-greeting{font-size:24px;font-weight:500}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color 0.15s}
.stat-card:hover{border-color:#C8C4BE}
.stat-label{font-size:11px;color:var(--text-tertiary);margin-bottom:6px}
.stat-val{font-size:26px;font-weight:500}
.section-header{font-size:10px;font-weight:500;color:var(--text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.cal-wrap{margin-bottom:24px}
.cal-event{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--radius);padding:9px 12px;margin-bottom:5px;position:relative;overflow:hidden;transition:opacity 0.15s}
.cal-event.now{border-left-color:#378ADD;background:#F5F9FF}
.cal-event.past{opacity:0.4}
.cal-event-title{font-size:13px;line-height:1.3;margin-bottom:3px}
.cal-event-title.now{font-weight:500}
.cal-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.cal-meta span{font-size:11px;color:var(--text-tertiary);display:flex;align-items:center;gap:3px}
.cal-meta span i{font-size:10px}
.now-badge{position:absolute;top:8px;right:10px;font-size:9px;padding:2px 6px;background:#378ADD;color:white;border-radius:6px;font-weight:600}
.cal-progress{position:absolute;bottom:0;left:0;height:2px;background:#378ADD}
.cal-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-tertiary);padding:10px 0}
.cal-refresh{font-size:11px;color:var(--text-tertiary);background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:3px;padding:0}
.cal-refresh:hover{color:var(--text-secondary)}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;transition:all 0.15s;border-top-width:2.5px}
.cat-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.cat-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-card-name{font-size:14px;font-weight:500}
.cat-card-tagline{font-size:11px;color:var(--text-tertiary);margin-bottom:10px;line-height:1.5}
.cat-card-meta{display:flex;gap:12px;font-size:12px;color:var(--text-secondary)}
.cat-card-meta strong{color:var(--text);font-weight:500}
.cat-high{font-weight:500;color:#A32D2D!important}
.c-blue{border-top-color:#378ADD}.c-coral{border-top-color:#D85A30}.c-green{border-top-color:#639922}
.c-pink{border-top-color:#D4537E}.c-purple{border-top-color:#7F77DD}.c-amber{border-top-color:#BA7517}
.task-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.task-check{width:15px;height:15px;margin-top:2px;border:1px solid var(--border);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.task-check:hover{border-color:#888}
.task-check.checked{background:currentColor;border-color:currentColor}
.task-check.checked::after{content:'✓';font-size:9px;color:white}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;line-height:1.4;margin-bottom:3px}
.task-title.done{text-decoration:line-through;color:var(--text-tertiary)}
.task-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;padding:2px 7px;border-radius:10px}
.tag-pri-high{background:#FCEBEB;color:#A32D2D}
.tag-pri-med{background:#FAEEDA;color:#854F0B}
.tag-pri-low{background:#EAF3DE;color:#3B6D11}
.link-tag{display:inline-flex;align-items:center;gap:3px;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary)}
.link-tag i{font-size:11px}
.task-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.due-overdue{font-size:10px;color:#A32D2D;font-weight:500}
.due-today{font-size:10px;color:#854F0B;font-weight:500}
.due-normal{font-size:10px;color:var(--text-tertiary)}
.task-del{color:var(--text-tertiary);display:flex;padding:2px}
.task-del:hover{color:#A32D2D}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px}
.proj-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer}
.proj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.proj-name{font-size:13px;font-weight:500;margin-left:10px}
.proj-meta{display:flex;align-items:center;gap:8px}
.proj-count{font-size:11px;color:var(--text-secondary)}
.proj-high{font-size:11px;color:#A32D2D;font-weight:500}
.proj-body{border-top:1px solid var(--border-light);padding:8px 14px 12px}
.add-task-btn{margin-top:8px;font-size:11px;padding:4px 10px;display:inline-flex;align-items:center;gap:4px;border-radius:var(--radius);border:1px solid;cursor:pointer}
.inline-form{padding:10px 0;border-bottom:1px solid var(--border-light);display:flex;flex-direction:column;gap:8px}
.form-input{font-size:13px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);width:100%}
.form-input:focus{border-color:#888}
.form-row{display:flex;gap:8px;align-items:center}
.form-select{font-size:12px;padding:4px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text)}
.form-date{font-size:12px;padding:4px 8px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text)}
.btn-add{font-size:12px;padding:4px 14px;border-radius:var(--radius);border:1px solid;cursor:pointer;font-weight:500}
.btn-cancel{font-size:12px;padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border);color:var(--text-secondary)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.filter-btn{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all 0.15s}
.filter-btn.active{font-weight:500}
.filter-div{width:1px;background:var(--border);margin:0 2px}
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--text-secondary);margin-bottom:16px;cursor:pointer}
.back-btn:hover{color:var(--text)}
.proj-add-row{display:flex;gap:8px;margin-bottom:10px}
.proj-add-input{flex:1;font-size:13px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text)}
.view-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.view-icon{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
.view-title{font-size:20px;font-weight:500}
.view-sub{font-size:11px;color:var(--text-tertiary)}
.view-actions{display:flex;gap:8px}
.action-btn{font-size:12px;padding:6px 12px;display:inline-flex;align-items:center;gap:4px;border-radius:var(--radius);border:1px solid;cursor:pointer}
.empty{font-size:13px;color:var(--text-tertiary);padding:8px 0}
.completed-toggle{font-size:11px;color:var(--text-tertiary);margin-top:8px;cursor:pointer;display:inline-flex;align-items:center;gap:3px}
.open-slack{font-size:10px;color:var(--text-tertiary);display:inline-flex;align-items:center;gap:3px}
.open-slack:hover{color:var(--text-secondary)}
.si-item{background:var(--surface);border:1px solid var(--border);border-left:3px solid #4A154B;border-radius:var(--radius);margin-bottom:6px;overflow:hidden;transition:opacity 0.25s,max-height 0.25s}
.si-item.private{border-left-color:#1164A3}
.si-item.dm{border-left-color:#2BAC76}
.si-item.dismissing{opacity:0;max-height:0!important;margin-bottom:0}
.si-header{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;cursor:pointer}
.si-avatar{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:white;flex-shrink:0}
.si-from{font-size:12px;font-weight:500;color:var(--text)}
.si-ch{font-size:10px;padding:1px 6px;border-radius:6px;background:var(--bg);color:var(--text-secondary);font-family:'DM Mono',monospace;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.si-type-tag{font-size:9px;padding:1px 5px;border-radius:5px;font-weight:600;text-transform:uppercase}
.si-preview{font-size:12px;color:var(--text-secondary);overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;flex:1;min-width:0;margin-top:2px}
.si-dismiss-x{background:none;border:none;cursor:pointer;color:var(--text-tertiary);font-size:14px;padding:0 0 0 6px;flex-shrink:0}
.si-dismiss-x:hover{color:#A32D2D}
.si-body{border-top:1px solid var(--border-light);padding:10px 14px 12px}
.si-full-text{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:10px;white-space:pre-wrap}
.si-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border-light)}
.si-btn{font-size:11px;padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.si-btn:hover{background:var(--bg);color:var(--text)}
.si-btn-dismiss:hover{background:#FCEBEB;color:#A32D2D;border-color:#FCEBEB}
.si-add-task-form{margin-top:10px;display:flex;flex-direction:column;gap:8px;padding-top:10px;border-top:1px solid var(--border-light)}
</style>
</head>

async function fetchCalendar(){
  try{const res=await fetch('/.netlify/functions/calendar');if(!res.ok)return null;const events=await res.json();return Array.isArray(events)&&events.length>0?{events,live:true}:null;}catch{return null;}
}
async function fetchSlack(){
  try{const res=await fetch('/.netlify/functions/slack');if(!res.ok)return null;const msgs=await res.json();return Array.isArray(msgs)&&msgs.length>0?msgs:null;}catch{return null;}
}
// Cloud-persisted dismissed Slack messages
async function fetchDismissed(){
  try{const res=await fetch('/.netlify/functions/slack-dismissed');if(!res.ok)return[];return await res.json();}catch{return[];}
}
async function addDismissed(id){
  try{await fetch('/.netlify/functions/slack-dismissed',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});}catch{}
}
async function clearDismissed(){
  try{await fetch('/.netlify/functions/slack-dismissed',{method:'DELETE'});}catch{}
}
async function markSlackRead(channelId, ts){
  if(!channelId||!ts)return;
  try{
    await fetch('/.netlify/functions/slack-mark',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({channelId,ts})
    });
  }catch{}
}
async function fetchTasks(){
  try{const res=await fetch('/.netlify/functions/tasks');if(!res.ok)return null;const t=await res.json();return Array.isArray(t)?t:null;}catch{return null;}
}
async function apiCreateTask(task){
  try{const res=await fetch('/.netlify/functions/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(task)});return res.ok;}catch{return false;}
}
async function apiUpdateTask(id,fields){
  try{const res=await fetch('/.netlify/functions/tasks',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,fields})});return res.ok;}catch{return false;}
}
async function apiDeleteTask(id){
  try{const res=await fetch('/.netlify/functions/tasks',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});return res.ok;}catch{return false;}
}

    setSyncMsg(ok?null:'Sync error');

    const remote=await fetchTasks();
    if(remote)setTasksRaw(remote);

    await apiUpdateTask(id,{done:newDone});
